services:
  postgres:
    image: postgres:16-alpine
    container_name: campfire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: campfire
      POSTGRES_PASSWORD: campfire
      POSTGRES_DB: campfire
    ports:
      - "5432:5432"
    volumes:
      - campfire-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campfire -d campfire"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  campfire-pgdata:
